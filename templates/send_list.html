
{% extends "base.html" %}
{% load static %}
{% block content %}
<body>

  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-body">
          <table id="LAY-app-forum-list" lay-filter="LAY-app-forum-list"></table>
          {% verbatim %}
            <script type="text/html" id="table-forum-list">
               {{#  if(d.send_key == 0){ }}
              <a class="layui-btn layui-btn-sm layui-btn-sm" lay-event="send"><i class="layui-icon layui-icon-add-circle-fine"></i>收藏</a>
               {{#  } else { }}
              <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="send_1">取消收藏</a>
               {{#  } }}
            </script>
          {% endverbatim %}
      </div>
    </div>
  </div>
  </body>
{% endblock %}

{% block js %}
  <script>
  layui.config({
    base: '{% static "layuiadmin/" %}' //静态资源所在路径
  }).extend({
    index: 'lib/index' //主入口模块
  }).use(['index', 'table', 'form'], function() {
      var $ = layui.$
          , form = layui.form
          , table = layui.table;

      //初始化表格
      table.render({
        elem: "#LAY-app-forum-list",
        url: "/send_list/",
        cols: [
          [{
            field: "id",
            title: "图书编号",
            width: 90,
            fixed: "left",
            align: "center",
          }, {
            field: "book_name",
            title: "书名"
          }, {
            field: "price",
            title: "价格(元)",
            width: 100
          }, {
            field: "rating",
            title: "评分",
            width: 80
          }, {
            field: "read_count",
            title: "阅读人数",
            width: 100
          }, {
            field: "comment_count",
            title: "评论数",
            width: 80
          },  {
            field: "author",
            title: "作者"
          },{
            field: "publisher",
            title: "出版社",
            width: 150,
          },{
            field: "category",
            title: "类型",
            width: 100,
            align: "left"
          },{
            title: "操作",
            width: 130,
            align: "center",
            fixed: "right",
            toolbar: "#table-forum-list"
          }]
        ],
        page: true,
        limit: 15,
        limits: [15, 20, 30, 50],
        text: "对不起，加载出现异常！"
      });

      //监听表格工具事件
      table.on("tool(LAY-app-forum-list)", function(e) {
        e.data;
        console.log(e.data.send_key);
        if("send" === e.event) layer.confirm("确定收藏图书 "+e.data.book_name+" 吗？", function(t) {
          $.ajax({
                 type: 'POST',
                 data:{"book_id":e.data.id, "send_key":e.data.send_key},
                 url: '/send_job/',
                 success: function (res) {
                     layer.msg(res.msg);location.reload()
                 },
                 error:function(response){
                     layer.msg(response.msg);
                 }
             }),
            layer.close(t)
        });
        else if("send_1" === e.event) layer.confirm("确定取消收藏 "+e.data.book_name+" 吗？", function(t){
          $.ajax({
                 type: 'POST',
                 data:{"book_id":e.data.id, "send_key":e.data.send_key},
                 url: '/send_job/',
                 success: function (res) {
                     layer.msg(res.msg);location.reload()
                 },
                 error:function(response){
                     layer.msg(response.msg);
                 }
             }),layer.close(t)
        });
      });
  });
  </script>
{% endblock %}
