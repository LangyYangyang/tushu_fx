
{% extends "base.html" %}
{% load static %}
{% block content %}
<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-form layui-card-header layuiadmin-card-header-auto">
          <input type="hidden" id="keyword" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="price_min" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="price_max" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="rating_min" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="rating_max" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="category" autocomplete="off" class="layui-input" value="">
        <div class="layui-form-item">
          <div class="layui-inline">
            <label class="layui-form-label">书名</label>
            <div class="layui-input-inline">
              <input type="text" name="keyword" id="keyword_1" placeholder="输入书名关键字" autocomplete="off" class="layui-input">
            </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">价格区间(元)</label>
            <div class="layui-input-inline" style="width: 100px;">
                <input type="text" name="price_min" id="price_min_1" placeholder="￥" autocomplete="off" class="layui-input" value="">
          </div>
          <div class="layui-form-mid">-</div>
          <div class="layui-input-inline" style="width: 100px;">
            <input type="text" name="price_max" id="price_max_1" placeholder="￥" autocomplete="off" class="layui-input" value="">
          </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">评分区间</label>
            <div class="layui-input-inline" style="width: 100px;">
                <input type="text" name="rating_min" id="rating_min_1" placeholder="最低" autocomplete="off" class="layui-input" value="">
          </div>
          <div class="layui-form-mid">-</div>
          <div class="layui-input-inline" style="width: 100px;">
            <input type="text" name="rating_max" id="rating_max_1" placeholder="最高" autocomplete="off" class="layui-input" value="">
          </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">类型</label>
            <div class="layui-input-inline">
              <select name="category" id="category_1">
                <option value="">请选择类型</option>
                <option value="文艺">文艺</option>
                <option value="人文社科">人文社科</option>
                <option value="科技">科技</option>
                <option value="童书">童书</option>
                <option value="教育">教育</option>
                <option value="生活">生活</option>
              </select>
            </div>
          </div>
          <div class="layui-inline">
            <button class="layui-btn layuiadmin-btn-list" lay-submit lay-filter="LAY-app-forumlist-search">
              <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="layui-card-body">
          <table id="LAY-app-forum-list" lay-filter="LAY-app-forum-list"></table>
          {% verbatim %}
            <script type="text/html" id="table-forum-list">
               {{#  if(d.send_key == 0){ }}
              <a class="layui-btn layui-btn-sm layui-btn-sm" lay-event="send"><i class="layui-icon layui-icon-add-circle-fine"></i>收藏</a>
               {{#  } else { }}
              <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="send_1">已 收 藏</a>
               {{#  } }}
            </script>
          {% endverbatim %}
      </div>
    </div>
  </div>
  </body>
{% endblock %}

{% block js %}
  <script>
  layui.config({
    base: '{% static "layuiadmin/" %}' //静态资源所在路径
  }).extend({
    index: 'lib/index' //主入口模块
  }).use(['index', 'table', 'form'], function() {
      var $ = layui.$
          , form = layui.form
          , table = layui.table;
      console.log('job_list.html loaded');
      console.log('Table element:', $('#LAY-app-forum-list'));

      //初始化表格
      table.render({
        elem: "#LAY-app-forum-list",
        url: "/get_job_list/",
        cols: [
          [{
            field: "id",
            title: "图书编号",
            width: 90,
            fixed: "left",
            align: "center",
          }, {
            field: "book_name",
            title: "书名"
          }, {
            field: "price",
            title: "价格(元)",
            width: 100
          }, {
            field: "rating",
            title: "评分",
            width: 80
          }, {
            field: "read_count",
            title: "阅读人数",
            width: 100
          }, {
            field: "comment_count",
            title: "评论数",
            width: 80
          },  {
            field: "author",
            title: "作者"
          },{
            field: "publisher",
            title: "出版社",
            width: 150,
          },{
            field: "category",
            title: "类型",
            width: 100,
            align: "left"
          },{
            title: "操作",
            width: 130,
            align: "center",
            fixed: "right",
            toolbar: "#table-forum-list"
          }]
        ],
        page: true,
        limit: 15,
        limits: [15, 20, 30, 50],
        text: "对不起，加载出现异常！"
      });

      //监听表格工具事件
      table.on("tool(LAY-app-forum-list)", function(e) {
        e.data;
        console.log(e.data.send_key);
        if("send" === e.event) layer.confirm("确定收藏图书 "+e.data.book_name+" 吗？", function(t) {
          $.ajax({
                 type: 'POST',
                 data:{"book_id":e.data.id, "send_key":e.data.send_key},
                 url: '/send_job/',
                 success: function (res) {
                     layer.msg(res.msg);location.reload()
                 },
                 error:function(response){
                     layer.msg(response.msg);
                 }
             });
            layer.close(t)
        });
        else if("send_1" === e.event) layer.confirm("确定取消收藏 "+e.data.book_name+" 吗？", function(t){
          $.ajax({
                 type: 'POST',
                 data:{"book_id":e.data.id, "send_key":e.data.send_key},
                 url: '/send_job/',
                 success: function (res) {
                     layer.msg(res.msg);location.reload()
                 },
                 error:function(response){
                     layer.msg(response.msg);
                 }
             });
            layer.close(t)
        });
      });

      //监听搜索
      form.on('submit(LAY-app-forumlist-search)', function (data) {
          var field = data.field;
          console.log('搜索参数:', field);
          console.log(notNumber(field.price_min))
          console.log(field.price_min == "")
          if(field.price_min != ""){
              if(notNumber(field.price_min)){
                  console.log(field.price_min)
              layer.msg("价格区间应为数字！");
              return false
              }
          }
          if(field.price_max != ""){
              if(notNumber(field.price_max)){
                  console.log(field.price_max)
              layer.msg("价格区间应为数字！");
              return false
              }
          }
          if(field.rating_min != ""){
              if(notNumber(field.rating_min)){
                  console.log(field.rating_min)
              layer.msg("评分区间应为数字！");
              return false
              }
          }
          if(field.rating_max != ""){
              if(notNumber(field.rating_max)){
                  console.log(field.rating_max)
              layer.msg("评分区间应为数字！");
              return false
              }
          }

          //执行重载
          table.reload('LAY-app-forum-list', {
              page:{curr:1},
              where: field
          });
      });
  });

  function notNumber(val) {
    var regPos = /^\d+(\.\d+)?$/; //非负浮点数
    var regNeg = /^(-(([0-9]+\.[0-9]*[1-9][0-9]*)|([0-9]*[1-9][0-9]*\.[0-9]+)|([0-9]*[1-9][0-9]*)))$/; //负浮点数
    if(regPos.test(val) || regNeg.test(val)) {
        return false;
        } else {
        return true;
        }
    }
  </script>
{% endblock %}
